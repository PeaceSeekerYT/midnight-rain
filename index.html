<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Midnight Rain</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Midnight Rain</h1>

<p>
  Move your mouse to change the wind.<br>
  Click to create splashes.
</p>

<button id="thunderBtn">⚡ Thunder</button>

<div id="controls">
  <label>Rain Intensity</label><br>
  <input type="range" id="rainSlider" min="80" max="600" value="250">
</div>

<canvas id="rainCanvas"></canvas>

<script src="script.js"></script>

</body>
</html>
